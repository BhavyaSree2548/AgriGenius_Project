<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AgriGenius</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<nav class="navbar glass-nav compact">
    <a class="brand" href="index.html">
        <span class="brand-mark">AG</span>
        <span>AgriGenius</span>
    </a>
    <div class="nav-actions">
        <button class="lang-toggle" data-lang-toggle type="button">తెలుగు</button>
        <a class="nav-link" href="login.html" data-i18n="login">Login</a>
    </div>
</nav>

<main class="auth-shell">
    <section class="auth-panel glass-card">
        <p class="eyebrow" data-i18n="createAccount">Create account</p>
        <h1 data-i18n="registerTitle">Register with AgriGenius</h1>
        <form id="registerForm" class="form-stack">
            <label>
                <span data-i18n="fullName">Full name</span>
                <input type="text" name="fullName" required autocomplete="name" placeholder="Ravi Kumar">
            </label>
            <label>
                <span data-i18n="email">Email</span>
                <input type="email" name="email" required autocomplete="email" placeholder="farmer@example.com">
            </label>
            <label>
                <span data-i18n="password">Password</span>
                <input type="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Minimum 6 characters">
            </label>
            <button class="btn btn-primary btn-full" type="submit" data-i18n="register">Register</button>
            <p class="form-message" id="registerMessage"></p>
        </form>
        <p class="auth-switch">
            <span data-i18n="haveAccount">Already have an account?</span>
            <a href="login.html" data-i18n="login">Login</a>
        </p>
    </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
