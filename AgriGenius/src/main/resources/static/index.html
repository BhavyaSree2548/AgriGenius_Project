<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriGenius</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-green-700 p-4 text-white flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold">AgriGenius</h1>
        <div>
            <select id="lang" class="text-black p-1 rounded">
                <option value="en">English</option>
                <option value="te">Telugu</option>
            </select>
            <a href="#" class="ml-4 hover:underline">Login</a>
        </div>
    </nav>
    <div class="container mx-auto p-6 mt-10">
        <div class="bg-white p-8 rounded-lg shadow-xl border-t-4 border-green-600">
            <h2 class="text-2xl font-semibold mb-6">Crop Disease Detector</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="file" class="p-2 border rounded">
                <input type="text" placeholder="Soil Type" class="p-2 border rounded">
            </div>
            <button class="mt-6 w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">Get Recommendation</button>
        </div>
    </div>
</body>
</html>
